<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<title>Walkathon</title>
<style>
body { font-family: Arial; padding:20px; }
.topbar { margin-bottom:20px; }
button { padding:6px 10px; margin-left:5px; }
.participant {
  border:1px solid #ccc;
  padding:10px;
  margin-bottom:10px;
  cursor:pointer;
}
.total {
  font-weight:bold;
  font-size:18px;
}
.admin-box {
  margin-top:40px;
  padding-top:20px;
  border-top:2px solid #ddd;
}
</style>
</head>
<body>

<div class="topbar">
  <button onclick="location.href='add.html'">Tilføj deltager</button>
  <button onclick="location.href='donate.html'">Doner beløb</button>
</div>

<div id="participants"></div>

<div class="admin-box">
  <button onclick="becomeAdmin()">Bliv admin</button>
  <span id="adminStatus"></span>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxIXoS-Xs_1jsE3sVqk_ge_LDC0O9ddpYKMj2xwXawfZtgWdQsC6D4umAzqQcJuKHqC7Q/exec";

let participants = [];
let donations = [];
let isAdmin = false;

/* HENT DATA */
async function loadData(){
  const p = await fetch(`${API_URL}?sheet=Deltagere`);
  const d = await fetch(`${API_URL}?sheet=Donationer`);
  participants = await p.json();
  donations = await d.json();
  render();
}

/* BEREGN TOTAL FOR EN DELTAGER */
function calculateTotal(name, distance){
  let total = 0;

  donations
    .filter(d => d.Modtager === name)
    .forEach(d => {
      total += Number(d.FastBeløb || 0);
      total += Number(d.BeløbPrKm || 0) * distance;
    });

  return total;
}

/* RENDER */
function render(){
  const container = document.getElementById("participants");
  container.innerHTML = "";

  participants.forEach(p => {
    const total = calculateTotal(p.Navn, p.Distance);

    const div = document.createElement("div");
    div.className = "participant";
    div.innerHTML = `
      <div class="total">${total} kr.</div>
      <div><strong>${p.Navn}</strong></div>
      <div class="distance" data-name="${p.Navn}">
        ${p.Distance} km
      </div>
    `;

    if(isAdmin){
      div.querySelector(".distance").addEventListener("click", () => {
        changeDistance(p.Navn, p.Distance);
      });
    }

    container.appendChild(div);
  });
}

/* ADMIN LOGIN */
function becomeAdmin(){
  const code = prompt("Indtast admin-kode:");
  if(code === "123"){
    isAdmin = true;
    document.getElementById("adminStatus").innerText = " (Admin aktiv)";
    render();
  } else {
    alert("Forkert kode");
  }
}

/* ÆNDRE DISTANCE (PLUS/MINUS) */
async function changeDistance(name, currentDistance){
  const input = prompt("Hvor mange kilometer er lige gået? (brug minus hvis nødvendigt)");
  if(input === null) return;

  const delta = Number(input);
  if(isNaN(delta)){
    alert("Ugyldigt tal");
    return;
  }

  const newDistance = currentDistance + delta;

  await fetch(`${API_URL}?sheet=Deltagere`,{
    method:"POST",
    body:JSON.stringify({
      Navn:name,
      Distance:newDistance
    })
  });

  loadData();
}

loadData();
</script>

</body>
</html>
