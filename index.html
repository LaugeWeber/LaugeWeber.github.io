<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>4. Maj Walkathon</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background:#f7f9fc; color:#333; }

/* --- HEADER --- */
header { background:#0069d9; color:white; text-align:center; padding:60px 20px 40px; }
header h1 { font-size:2.5em; margin-bottom:10px; }
.heroTotals { display:flex; justify-content:center; gap:40px; font-size:1.2em; margin-top:20px; }
@media(max-width:768px){ .heroTotals { flex-direction:column; gap:10px; } }

/* --- MAIN CONTAINER --- */
.container { max-width:1200px; margin:0 auto; padding:20px; }

/* --- LEADERBOARDS --- */
.leaderboards { display:flex; gap:20px; flex-wrap:wrap; margin-top:40px; }
.card { background:white; padding:20px; border-radius:10px; box-shadow:0 5px 20px rgba(0,0,0,0.1); flex:1 1 300px; }
.card h3 { color:#0069d9; margin-bottom:10px; }

/* --- PARTICIPANT LIST --- */
.participantList { margin-top:40px; background:white; padding:20px; border-radius:10px; box-shadow:0 5px 20px rgba(0,0,0,0.1); }
.participantList table { width:100%; border-collapse:collapse; }
.participantList th, .participantList td { border:1px solid #ddd; padding:8px; text-align:left; }
.participantList thead { background:#f0f4f8; }

footer { text-align:center; padding:20px; margin-top:40px; background:#eee; }

/* --- MOBILE --- */
@media(max-width:768px){ .leaderboards { flex-direction:column; } }
</style>
</head>
<body>

<header>
<h1>4. Maj Walkathon – Kollegiet</h1>
<div class="heroTotals">
<div><strong>Total donation:</strong> <span id="totalDonation">0</span> kr</div>
<div><strong>Total distance:</strong> <span id="totalDistance">0</span> km</div>
</div>
</header>

<div class="container">

<!-- LEADERBOARDS -->
<div class="leaderboards">
<div class="card">
<h3>Top 5 distance (km)</h3>
<table id="leaderboardDistance"><tbody></tbody></table>
</div>
<div class="card">
<h3>Top 5 donationer (beløb pr deltager)</h3>
<table id="leaderboardDonationAmount"><tbody></tbody></table>
</div>
<div class="card">
<h3>Top 5 modtagere af donationer</h3>
<table id="leaderboardDonationCount"><tbody></tbody></table>
</div>
</div>

<!-- TILMELDTE DELTAGERE -->
<div class="participantList">
<h3>Tilmeldte deltagere</h3>
<table id="participantListTable">
<thead><tr><th>Navn</th><th>Distance (km)</th></tr></thead>
<tbody></tbody>
</table>
</div>

<footer>© 2026 4. Maj Walkathon – Kollegiet</footer>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxPcNg0sgaPJycDm2vS-hQSeqF7_vmvfsQiF37Ieq-HyJF-Qm9BihSYk9XNR1mPpNB4EQ/exec";
let participants = [];
let donors = [];

async function fetchParticipants() {
    const res = await fetch(`${API_URL}?sheet=Deltagere`);
    participants = await res.json();
    updateParticipants();
    updateLeaderboards();
    updateTotals();
}

async function fetchDonors() {
    const res = await fetch(`${API_URL}?sheet=Donationer`);
    donors = await res.json();
    updateLeaderboards();
    updateTotals();
}

function updateParticipants(){
    const tbody = document.querySelector("#participantListTable tbody");
    tbody.innerHTML="";
    participants.forEach(p=>{
        const row = document.createElement("tr");
        row.innerHTML=`<td>${p.Navn}</td><td>${p.Distance.toFixed(1)}</td>`;
        tbody.appendChild(row);
    });
}

function updateTotals(){
    const totalDistance = participants.reduce((sum,p)=>sum+p.Distance,0);
    const totalDonation = donors.reduce((sum,d)=>sum+d.Beløb,0);
    document.getElementById("totalDistance").textContent = totalDistance.toFixed(1);
    document.getElementById("totalDonation").textContent = totalDonation.toFixed(0);
}

function updateLeaderboards(){
    // Top distance
    const topDistance = [...participants].sort((a,b)=>b.Distance - a.Distance).slice(0,5);
    const tbodyDist = document.querySelector("#leaderboardDistance tbody");
    tbodyDist.innerHTML="";
    topDistance.forEach(p=>{ const row=document.createElement("tr"); row.innerHTML=`<td>${p.Navn}</td><td>${p.Distance.toFixed(1)}</td>`; tbodyDist.appendChild(row); });

    // Top donation pr deltager
    const donationSums = participants.map(p=>{ const sum=donors.filter(d=>d.Mål===p.Navn).reduce((a,d)=>a+d.Beløb,0); return {Navn:p.Navn, Sum:sum}; });
    const topDonationAmount = donationSums.sort((a,b)=>b.Sum - a.Sum).slice(0,5);
    const tbodyDonationAmount = document.querySelector("#leaderboardDonationAmount tbody");
    tbodyDonationAmount.innerHTML="";
    topDonationAmount.forEach(d=>{ const row=document.createElement("tr"); row.innerHTML=`<td>${d.Navn}</td><td>${d.Sum.toFixed(0)}</td>`; tbodyDonationAmount.appendChild(row); });

    // Top modtagere
    const donationReceived = participants.map(p=>{ const totalReceived=donors.filter(d=>d.Mål===p.Navn).reduce((a,d)=>a+d.Beløb,0); return {Navn:p.Navn, Total:totalReceived}; });
    const topDonationReceived = donationReceived.sort((a,b)=>b.Total - a.Total).slice(0,5);
    const tbodyDonationCount = document.querySelector("#leaderboardDonationCount tbody");
    tbodyDonationCount.innerHTML="";
    topDonationReceived.forEach(d=>{ const row=document.createElement("tr"); row.innerHTML=`<td>${d.Navn}</td><td>${d.Total.toFixed(0)}</td>`; tbodyDonationCount.appendChild(row); });
}

// INIT
fetchParticipants();
fetchDonors();
</script>

</body>
</html>
