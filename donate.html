<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doner – Walkathon</title>
<style>
input, select, button {
  display:block;
  margin:10px 0;
  padding:8px;
  font-size:1em;
  width:300px;
}
select option[disabled] {
  color: #999;
}
</style>
</head>
<body>
<h1>Doner beløb</h1>

<form id="sponsorForm">
  <input type="tel" id="sponsorPhone" placeholder="Telefonnummer" required pattern="[0-9]{8}">
  <input type="email" id="sponsorEmail" placeholder="Email" required>
  <input type="text" id="sponsorName" placeholder="Dit navn" required>
  <select id="sponsorRecipient" required>
    <option value="" disabled selected>Modtager</option>
  </select>
  <input type="number" id="sponsorFlat" placeholder="Engangsbeløb (kr.)">
  <input type="number" id="sponsorPerKm" placeholder="Beløb pr. km (kr.)">
  <button type="submit">Tilføj donation</button>
</form>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxIXoS-Xs_1jsE3sVqk_ge_LDC0O9ddpYKMj2xwXawfZtgWdQsC6D4umAzqQcJuKHqC7Q/exec";
let participants = [];

// Hent deltagere og fyld dropdown
async function fetchParticipants(){
  const res = await fetch(`${API_URL}?sheet=Deltagere`);
  participants = await res.json();

  const sel = document.getElementById("sponsorRecipient");
  sel.innerHTML = '<option value="" disabled selected>Modtager</option>'; // placeholder
  participants.forEach(p=>{
    const opt = document.createElement("option");
    opt.value = p.Navn;       // Modtager hedder Navn i sheets
    opt.textContent = p.Navn;
    sel.appendChild(opt);
  });
}
fetchParticipants();

document.getElementById("sponsorForm").addEventListener("submit", async e=>{
  e.preventDefault();
  
  const phone = document.getElementById("sponsorPhone").value.trim();
  const email = document.getElementById("sponsorEmail").value.trim();
  const name = document.getElementById("sponsorName").value.trim();
  const recipient = document.getElementById("sponsorRecipient").value;
  const flat = parseFloat(document.getElementById("sponsorFlat").value)||0;
  const perKm = parseFloat(document.getElementById("sponsorPerKm").value)||0;

  if(!phone || !email || !name || !recipient || (flat<=0 && perKm<=0)){
    alert("Udfyld alle felter korrekt");
    return;
  }

  // Donation data
  const donationData = {
    Telefon: phone,
    Email: email,
    Navn: name,
    Modtager: recipient,
    FastBeløb: flat,
    BeløbPrKm: perKm
  };

  await fetch(`${API_URL}?sheet=Donationer`, {
    method:"POST",
    body:JSON.stringify(donationData)
  });

  alert("Donation registreret!");
  document.getElementById("sponsorForm").reset();
});
</script>
</body>
</html>
