<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<title>Doner</title>
<style>
body{font-family:sans-serif;padding:20px;}
input,select,button{display:block;margin:10px 0;padding:8px;width:300px;}
</style>
</head>
<body>

<a href="index.html">← Tilbage</a>
<h1>Doner</h1>

<form id="form">

<input type="tel" id="phone" placeholder="Telefonnummer" required pattern="[0-9]{8}">
<input type="email" id="mail" placeholder="Mail" required>
<input type="text" id="name" placeholder="Navn" required>

<select id="recipient" required></select>

<input type="number" id="flat" placeholder="Fast beløb">
<input type="number" id="perkm" placeholder="Beløb pr km">

<button type="submit">Doner</button>

</form>

<script>
const API_URL="DIN_WEBAPP_URL_HER";

let participants=[];
let donors=[];

async function loadAll(){
  const p = await fetch(`${API_URL}?sheet=Deltagere`);
  const d = await fetch(`${API_URL}?sheet=Donationer`);

  participants = await p.json();
  donors = await d.json();

  const sel=document.getElementById("recipient");
  sel.innerHTML="<option value=''>Vælg modtager</option>";
  participants.forEach(p=>{
    sel.innerHTML+=`<option>${p.Navn}</option>`;
  });
}

loadAll();

/* Autofill ved eksisterende telefon */
document.getElementById("phone").addEventListener("blur",()=>{
  const phone = phoneInput.value;
  const match = donors.find(d=>d.Telefon===phone);

  if(match){
    mail.value = match.Mail;
    name.value = match.Navn;
  }
});

const phoneInput=document.getElementById("phone");
const mail=document.getElementById("mail");
const name=document.getElementById("name");
const recipient=document.getElementById("recipient");
const flat=document.getElementById("flat");
const perkm=document.getElementById("perkm");

document.getElementById("form").addEventListener("submit",async e=>{
  e.preventDefault();

  await fetch(`${API_URL}?sheet=Donationer`,{
    method:"POST",
    body:JSON.stringify({
      Telefon:phoneInput.value,
      Mail:mail.value,
      Navn:name.value,
      Modtager:recipient.value,
      FastBeløb:Number(flat.value||0),
      BeløbPrKm:Number(perkm.value||0)
    })
  });

  alert("Donation registreret");
  form.reset();
  loadAll();
});
</script>

</body>
</html>
